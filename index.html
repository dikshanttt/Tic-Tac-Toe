
<style>
  #ttt-root {
    font-family: "Poppins", sans-serif;
    background: radial-gradient(circle at center, #2b1055, #000000);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 520px;
    flex-direction: column;
    color: white;
    padding: 24px 0;
    border-radius: 12px;
  }
  #ttt-root h1 {
    color: #fff;
    margin: 0 0 16px;
    font-size: 1.6rem;
    text-shadow: 0 0 20px #ff00ff;
  }
  .ttt-controls { margin-bottom: 12px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; align-items: center; }
  .ttt-label { font-weight: 500; color: #ff00ff; text-shadow: 0 0 10px #ff00ff; font-size: 0.9rem; }
  .ttt-dropdown { position: relative; display: inline-block; width: 130px; color: #00ffff; font-size: 0.9rem; cursor: pointer; user-select: none; }
  .ttt-selected {
    background: rgba(20,10,50,0.9); border: 2px solid #00ffff; border-radius: 10px;
    padding: 8px 12px; box-shadow: 0 0 14px rgba(0,255,255,0.35);
    text-shadow: 0 0 8px #00ffff; transition: all 0.2s;
  }
  .ttt-selected::after { content: "▼"; float: right; font-size: 0.75em; margin-top: 2px; transition: transform 0.2s; }
  .ttt-dropdown.open .ttt-selected::after { transform: rotate(180deg); }
  .ttt-options {
    display: none; position: absolute; width: 100%;
    background: rgba(20,10,40,0.97); border: 1px solid #00ffff;
    border-radius: 10px; margin-top: 5px; z-index: 20; overflow: hidden;
    box-shadow: 0 0 16px rgba(0,255,255,0.35);
  }
  .ttt-dropdown.open .ttt-options { display: block; }
  .ttt-option { padding: 8px 12px; color: #fff; transition: all 0.2s; font-size: 0.9rem; }
  .ttt-option:hover { background: #00ffff; color: #000; }
  .ttt-board {
    display: grid; grid-template-columns: repeat(3, 95px); grid-template-rows: repeat(3, 95px);
    gap: 8px; background: linear-gradient(145deg, #3a0ca3, #7209b7);
    padding: 14px; border-radius: 18px; box-shadow: 0 0 28px rgba(114,9,183,0.5);
    margin: 4px 0;
  }
  .ttt-cell {
    background: radial-gradient(circle at 30% 30%, #2b1055, #1a0535);
    border: 2px solid rgba(255,255,255,0.15); border-radius: 13px;
    display: flex; justify-content: center; align-items: center;
    font-size: 2.3em; cursor: pointer; transition: all 0.25s;
    box-shadow: inset 0 0 8px rgba(255,255,255,0.08);
  }
  .ttt-cell:hover:not(.taken):not(.dead) { transform: scale(1.05); box-shadow: 0 0 16px rgba(255,255,255,0.2); }
  .ttt-cell.X { color: #00ffff; text-shadow: 0 0 14px #00ffff, 0 0 28px #00ffff; }
  .ttt-cell.O { color: #ff00ff; text-shadow: 0 0 14px #ff00ff, 0 0 28px #ff00ff; }
  .ttt-cell.win-cell { box-shadow: 0 0 22px rgba(255,220,0,0.7); border-color: rgba(255,220,0,0.7); }
  #ttt-status { margin-top: 16px; font-size: 1.1rem; text-shadow: 0 0 8px #fff; min-height: 1.5em; }
  #ttt-reset {
    margin-top: 12px; padding: 9px 20px; font-size: 0.95rem;
    border: none; border-radius: 8px; background: #00bfff; color: white;
    cursor: pointer; transition: background 0.2s; box-shadow: 0 0 12px #00bfff;
  }
  #ttt-reset:hover { background: #0088cc; }
  .ttt-diff-row { opacity: 1; transition: opacity 0.2s; }
  .ttt-diff-row.dimmed { opacity: 0.4; pointer-events: none; }
</style>

<div id="ttt-root">
  <h1>Neon Tic Tac Toe</h1>

  <div class="ttt-controls">
    <span class="ttt-label">Mode:</span>
    <div class="ttt-dropdown" id="modeDD">
      <div class="ttt-selected" id="modeSel">Vs Bot</div>
      <div class="ttt-options" id="modeOpts">
        <div class="ttt-option" data-val="bot">Vs Bot</div>
        <div class="ttt-option" data-val="2p">2 Players</div>
      </div>
    </div>
  </div>

  <div class="ttt-controls ttt-diff-row" id="diffRow">
    <span class="ttt-label">Difficulty:</span>
    <div class="ttt-dropdown" id="diffDD">
      <div class="ttt-selected" id="diffSel">Easy</div>
      <div class="ttt-options" id="diffOpts">
        <div class="ttt-option" data-val="easy">Easy</div>
        <div class="ttt-option" data-val="medium">Medium</div>
        <div class="ttt-option" data-val="hard">Hard</div>
      </div>
    </div>
  </div>

  <div class="ttt-board" id="board">
    <div class="ttt-cell" data-i="0"></div>
    <div class="ttt-cell" data-i="1"></div>
    <div class="ttt-cell" data-i="2"></div>
    <div class="ttt-cell" data-i="3"></div>
    <div class="ttt-cell" data-i="4"></div>
    <div class="ttt-cell" data-i="5"></div>
    <div class="ttt-cell" data-i="6"></div>
    <div class="ttt-cell" data-i="7"></div>
    <div class="ttt-cell" data-i="8"></div>
  </div>

  <div id="ttt-status">Your turn (X)</div>
  <button id="ttt-reset">Restart Game</button>
</div>

<script>
(function() {
  const cells = document.querySelectorAll(".ttt-cell");
  const statusEl = document.getElementById("ttt-status");
  const resetBtn = document.getElementById("ttt-reset");
  const diffRow = document.getElementById("diffRow");

  let board, gameOver, botThinking, currentPlayer, gameMode, difficulty;
  gameMode = "bot"; difficulty = "easy";

  const WIN_PATTERNS = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  // --- Dropdowns ---
  function setupDropdown(ddId, selId, optsId, onChange) {
    const dd = document.getElementById(ddId);
    const sel = document.getElementById(selId);
    const opts = document.getElementById(optsId);
    sel.addEventListener("click", e => { e.stopPropagation(); dd.classList.toggle("open"); });
    opts.querySelectorAll(".ttt-option").forEach(opt => {
      opt.addEventListener("click", () => {
        sel.textContent = opt.textContent;
        dd.classList.remove("open");
        onChange(opt.dataset.val);
      });
    });
    return dd;
  }

  const modeDD = setupDropdown("modeDD", "modeSel", "modeOpts", val => {
    gameMode = val;
    diffRow.classList.toggle("dimmed", val === "2p");
    restartGame();
  });

  const diffDD = setupDropdown("diffDD", "diffSel", "diffOpts", val => {
    difficulty = val;
    restartGame();
  });

  document.addEventListener("click", () => {
    modeDD.classList.remove("open");
    diffDD.classList.remove("open");
  });

  // --- Game State ---
  function restartGame() {
    board = ["","","","","","","","",""];
    gameOver = false;
    botThinking = false;  // FIX: cancel any pending bot move intent
    currentPlayer = "X";
    cells.forEach(c => { c.textContent = ""; c.className = "ttt-cell"; });
    updateStatus();
  }

  function updateStatus() {
    if (gameOver) return;
    if (gameMode === "2p") {
      statusEl.textContent = `Player ${currentPlayer}'s turn`;
    } else {
      statusEl.textContent = currentPlayer === "X" ? "Your turn (X)" : "Bot thinking...";
    }
  }

  // --- Cell click ---
  cells.forEach(cell => {
    cell.addEventListener("click", () => {
      const i = parseInt(cell.dataset.i);
      if (gameOver || board[i] !== "" || botThinking) return;
      if (gameMode === "bot" && currentPlayer !== "X") return;

      makeMove(i, currentPlayer);
      if (gameOver) return;

      if (gameMode === "2p") {
        currentPlayer = currentPlayer === "X" ? "O" : "X";
        updateStatus();
      } else {
        // Bot's turn
        currentPlayer = "O";
        botThinking = true;
        updateStatus();
        const snapshot = board.slice(); // capture state at time of click
        setTimeout(() => {
          // FIX: guard — if game restarted during delay, abort
          if (gameOver || board !== snapshot && board.join("") !== snapshot.join("")) {
            // board was reset, don't move
          } else if (!gameOver) {
            const move = getBotMove();
            if (move !== undefined) {
              makeMove(move, "O");
              if (!gameOver) {
                currentPlayer = "X";
                updateStatus();
              }
            }
          }
          botThinking = false;
        }, 500);
      }
    });
  });

  function makeMove(i, player) {
    board[i] = player;
    const cell = cells[i];
    cell.textContent = player;
    cell.classList.add(player, "taken");
    checkResult();
  }

  function checkResult() {
    for (const [a,b,c] of WIN_PATTERNS) {
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        const winner = board[a];
        gameOver = true;
        cells[a].classList.add("win-cell");
        cells[b].classList.add("win-cell");
        cells[c].classList.add("win-cell");
        cells.forEach(c => c.classList.add("dead"));
        if (gameMode === "2p") statusEl.textContent = `Player ${winner} wins!`;
        else statusEl.textContent = winner === "X" ? "You win!" : "Bot wins!";
        return;
      }
    }
    if (!board.includes("")) {
      gameOver = true;
      cells.forEach(c => c.classList.add("dead"));
      statusEl.textContent = "It's a draw!";
    }
  }

  // --- Bot Logic ---
  function getBotMove() {
    const avail = board.map((v,i) => v === "" ? i : null).filter(v => v !== null);
    if (!avail.length) return undefined;

    if (difficulty === "easy") {
      return randomMove(avail);
    }
    if (difficulty === "medium") {
      // FIX: Medium = always block/win if possible, otherwise 65% smart
      const smart = bestMove();
      const isWinOrBlock = isWinningOrBlocking(smart);
      if (isWinOrBlock || Math.random() < 0.65) return smart;
      return randomMove(avail);
    }
    return bestMove();
  }

  function isWinningOrBlocking(move) {
    // Check if this move wins for O
    board[move] = "O";
    let wins = checkWin(board, "O");
    board[move] = "";
    if (wins) return true;
    // Check if this move blocks X from winning
    board[move] = "X";
    let blocks = checkWin(board, "X");
    board[move] = "";
    return blocks;
  }

  function checkWin(b, player) {
    return WIN_PATTERNS.some(([a,c,d]) => b[a] === player && b[c] === player && b[d] === player);
  }

  function randomMove(avail) {
    return avail[Math.floor(Math.random() * avail.length)];
  }

  function bestMove() {
    let best = -Infinity, move;
    for (let i = 0; i < 9; i++) {
      if (board[i] === "") {
        board[i] = "O";
        const score = minimax(board, 0, false, -Infinity, Infinity);
        board[i] = "";
        if (score > best) { best = score; move = i; }
      }
    }
    return move;
  }

  // FIX: Added alpha-beta pruning for performance
  function minimax(b, depth, isMax, alpha, beta) {
    if (checkWin(b, "O")) return 10 - depth;
    if (checkWin(b, "X")) return depth - 10;
    if (!b.includes("")) return 0;

    if (isMax) {
      let best = -Infinity;
      for (let i = 0; i < 9; i++) {
        if (b[i] === "") {
          b[i] = "O";
          best = Math.max(best, minimax(b, depth+1, false, alpha, beta));
          b[i] = "";
          alpha = Math.max(alpha, best);
          if (beta <= alpha) break;
        }
      }
      return best;
    } else {
      let best = Infinity;
      for (let i = 0; i < 9; i++) {
        if (b[i] === "") {
          b[i] = "X";
          best = Math.min(best, minimax(b, depth+1, true, alpha, beta));
          b[i] = "";
          beta = Math.min(beta, best);
          if (beta <= alpha) break;
        }
      }
      return best;
    }
  }

  resetBtn.addEventListener("click", restartGame);
  restartGame();
})();
</script>
